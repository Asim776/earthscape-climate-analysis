<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}EarthScape Authentication{% endblock %}</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    
    <style>
        * {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #0a1a2f 0%, #0c2b3e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow-x: hidden;
        }
        
        /* Animated Background Elements */
        body::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 320"><path fill="rgba(107,197,255,0.05)" fill-opacity="1" d="M0,96L48,112C96,128,192,160,288,160C384,160,480,128,576,122.7C672,117,768,139,864,154.7C960,171,1056,181,1152,165.3C1248,149,1344,107,1392,85.3L1440,64L1440,320L1392,320C1344,320,1248,320,1152,320C1056,320,960,320,864,320C768,320,672,320,576,320C480,320,384,320,288,320C192,320,96,320,48,320L0,320Z"></path></svg>');
            background-repeat: no-repeat;
            background-position: bottom;
            background-size: cover;
            opacity: 0.3;
            bottom: 0;
            left: 0;
            pointer-events: none;
        }
        
        /* Floating Particles Effect */
        .particle {
            position: absolute;
            background: rgba(107, 197, 255, 0.3);
            border-radius: 50%;
            pointer-events: none;
            animation: float linear infinite;
        }
        
        @keyframes float {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 0.5;
            }
            90% {
                opacity: 0.5;
            }
            100% {
                transform: translateY(-100vh) rotate(360deg);
                opacity: 0;
            }
        }
        
        .auth-container {
            width: 100%;
            max-width: 480px;
            padding: 20px;
            position: relative;
            z-index: 1;
        }
        
        .auth-card {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 40px 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            border: 1px solid rgba(107, 197, 255, 0.2);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        
        .auth-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 35px 60px -15px rgba(0, 0, 0, 0.3);
        }
        
        .auth-logo {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #1e6f9f, #2c9cd4);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            box-shadow: 0 8px 20px rgba(30, 111, 159, 0.3);
        }
        
        .auth-logo i {
            font-size: 40px;
            color: white;
        }
        
        .auth-title {
            font-size: 28px;
            font-weight: 700;
            color: #0a2b3c;
            margin-bottom: 8px;
        }
        
        .auth-subtitle {
            color: #5b7f9e;
            font-size: 14px;
        }
        
        .form-group {
            margin-bottom: 24px;
        }
        
        .form-label {
            font-weight: 600;
            color: #1e2f3e;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
        }
        
        .form-label i {
            color: #2c9cd4;
        }
        
        .form-control {
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            padding: 12px 16px;
            font-size: 15px;
            transition: all 0.3s ease;
            background: white;
        }
        
        .form-control:focus {
            border-color: #2c9cd4;
            box-shadow: 0 0 0 4px rgba(44, 156, 212, 0.1);
            outline: none;
        }
        
        .form-hint {
            font-size: 12px;
            color: #6c86a3;
            margin-top: 6px;
        }
        
        .form-check {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .form-check-input {
            width: 18px;
            height: 18px;
            cursor: pointer;
            border: 2px solid #cbd5e1;
        }
        
        .form-check-input:checked {
            background-color: #2c9cd4;
            border-color: #2c9cd4;
        }
        
        .form-check-label {
            color: #4a6a85;
            font-size: 14px;
            cursor: pointer;
        }
        
        .btn-auth {
            background: linear-gradient(135deg, #1e6f9f, #2c9cd4);
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-weight: 600;
            color: white;
            font-size: 16px;
            transition: all 0.3s ease;
            margin-top: 8px;
        }
        
        .btn-auth:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(30, 111, 159, 0.3);
            color: white;
        }
        
        .btn-auth:active {
            transform: translateY(0);
        }
        
        .alert {
            border-radius: 12px;
            padding: 12px 16px;
            margin-bottom: 20px;
            border: none;
            font-size: 14px;
        }
        
        .alert-danger {
            background: #fee2e2;
            color: #991b1b;
        }
        
        .auth-footer {
            text-align: center;
            margin-top: 24px;
            padding-top: 20px;
            border-top: 1px solid #e2e8f0;
        }
        
        .auth-footer p {
            color: #5b7f9e;
            margin: 0;
            font-size: 14px;
        }
        
        .auth-link {
            color: #2c9cd4;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s;
        }
        
        .auth-link:hover {
            color: #1e6f9f;
            text-decoration: underline;
        }
        
        .forgot-link {
            color: #6c86a3;
            text-decoration: none;
            font-size: 12px;
            transition: color 0.2s;
        }
        
        .forgot-link:hover {
            color: #2c9cd4;
        }
        
        .auth-features {
            display: flex;
            justify-content: space-between;
            margin-top: 24px;
            padding-top: 16px;
            gap: 12px;
        }
        
        .feature-item {
            flex: 1;
            text-align: center;
            padding: 8px;
            background: #f8fafc;
            border-radius: 12px;
            font-size: 12px;
            color: #1e6f9f;
            font-weight: 500;
        }
        
        .feature-item i {
            display: block;
            font-size: 20px;
            margin-bottom: 6px;
            color: #2c9cd4;
        }
        
        .auth-demo {
            margin-top: 20px;
            text-align: center;
        }
        
        .demo-info {
            background: #f0f9ff;
            padding: 10px;
            border-radius: 12px;
            font-size: 12px;
            color: #1e6f9f;
        }
        
        .demo-info i {
            margin-right: 6px;
        }
        
        @media (max-width: 576px) {
            .auth-card {
                padding: 32px 24px;
            }
            
            .auth-title {
                font-size: 24px;
            }
            
            .auth-features {
                flex-direction: column;
                gap: 8px;
            }
            
            .feature-item {
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 8px;
            }
            
            .feature-item i {
                display: inline-block;
                margin-bottom: 0;
                font-size: 16px;
            }
        }
    </style>
    
    {% block extra_css %}{% endblock %}
</head>
<body>
    <!-- Floating particles effect -->
    <div id="particles"></div>
    
    {% block auth_content %}{% endblock %}
    
    <script>
        // Create floating particles effect
        function createParticles() {
            const particlesContainer = document.getElementById('particles');
            if (!particlesContainer) return;
            
            const particleCount = 50;
            
            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.classList.add('particle');
                const size = Math.random() * 4 + 2;
                particle.style.width = `${size}px`;
                particle.style.height = `${size}px`;
                particle.style.left = `${Math.random() * 100}%`;
                particle.style.animationDuration = `${Math.random() * 10 + 10}s`;
                particle.style.animationDelay = `${Math.random() * 10}s`;
                particle.style.opacity = Math.random() * 0.5;
                particlesContainer.appendChild(particle);
            }
        }
        
        createParticles();
    </script>
    
    {% block extra_js %}{% endblock %}
</body>
</html>
